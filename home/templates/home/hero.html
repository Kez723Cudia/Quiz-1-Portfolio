<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Stack - Engr. Kezia Yuriese Cudia</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-container {
            display: flex;
            height: 100vh; /* full viewport height */
        }
        .hero-left {
            flex: 2; /* 2/3 width */
            background-color: #111; /* dark background */
            color: #f8f9fa; /* light text */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .hero-left h1 {
            font-weight: 800;
            color: #f8f9fa; /* light thick text for first name */
        }
        .hero-left h2 {
            font-weight: 800;
            color: navy; /* navy metallic blue surname */
        }
        .hero-left p {
            font-weight: 500; /* thicker tagline */
            color: rgba(248, 249, 250, 0.7); /* semi-transparent light text */
            margin-top: 1rem;
        }
        .hero-right {
            flex: 1; /* 1/3 width */
            background-color: rgba(0, 123, 255, 0.2); /* semi-transparent light blue */
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Left Side -->
        <div class="hero-left text-center">
            <h1>Kezia Yuriese</h1>
            <h2>Cudia</h2>
            <p>Improves systems and develops innovative solutions.</p>
            <a href="#" class="btn btn-success btn-lg mt-3">Get in Touch</a>
        </div>

        <!-- Right Side -->
        <div class="hero-right">
            <!-- Empty for now, just background -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

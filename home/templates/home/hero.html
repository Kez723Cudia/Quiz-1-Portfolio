<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Stack - Engr. Kezia Yuriese Cudia</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-container {
            display: flex;
            height: 100vh;
        }
        .hero-left {
            flex: 3; /* 3/5 width */
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* move content higher */
            align-items: flex-start;
            padding: 5rem 4rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* professional font */
        }
        .hero-left h1 {
            font-size: 4.5rem; /* larger first name */
            font-weight: 800;
            color: #f8f9fa;
            margin-bottom: 0.5rem;
        }
        .hero-left h2 {
            font-size: 4rem; /* larger surname */
            font-weight: 800;
            color: navy;
            margin-bottom: 1rem;
        }
        .hero-left p {
            font-size: 1.5rem; /* increased tagline size */
            font-weight: 600;
            color: rgba(248, 249, 250, 0.8);
            margin-bottom: 1.5rem;
        }
        .hero-right {
            flex: 2; /* 2/5 width */
            background-color: #0a3d91; /* darker metallic blue */
        }
        .btn-custom {
            background-color: #0a3d91; /* same as right side */
            border: 2px solid navy; /* navy border */
            color: #fff;
        }
        .btn-custom:hover {
            background-color: #072c6b; /* darker hover */
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <!-- Left Side -->
        <div class="hero-left">
            <h1>Kezia Yuriese</h1>
            <h2>Cudia</h2>
            <p>Improves systems and develops innovative solutions.</p>
            <a href="#" class="btn btn-custom btn-lg mt-3">Get in Touch</a>
        </div>

        <!-- Right Side -->
        <div class="hero-right"></div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

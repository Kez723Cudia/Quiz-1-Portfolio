<!DOCTYPE html>
<html>
<head>
    <title>Projects List</title>
</head>
<body>
    <h1>Projects</h1>
    <ul>
        {% for project in projects %}
            <li>
                <a href="{% url 'project_detail' project.id %}">
                    {{ project.project_name }}
                </a>
                <br>
                <small>{{ project.tech_stack }}</small>
            </li>
        {% empty %}
            <li>No projects available.</li>
        {% endfor %}
    </ul>
</body>
</html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ project.project_name }} - Engr. Kezia Yuriese Cudia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #111; font-family: Helvetica, Arial, sans-serif; color: #f8f9fa; }
        .projects-container { padding: 5rem 4rem; animation: fadeInUp 1.5s ease-in-out; }
        .projects-container h1 { font-size: 3.5rem; font-weight: 800; color: navy; margin-bottom: 2rem; }
        .project-card { background-color: rgba(173, 216, 230, 0.1); border-left: 4px solid royalblue; padding: 1.5rem; margin-bottom: 2rem; border-radius: 0.3rem; }
        .project-card h2 { font-size: 1.8rem; font-weight: 700; color: royalblue; margin-bottom: 1rem; }
        .project-card p { font-size: 1.1rem; color: rgba(248, 249, 250, 0.85); }
        .btn-view { display: inline-block; padding: 0.5rem 1rem; background-color: royalblue; color: #fff; border-radius: 0.3rem; text-decoration: none; transition: all 0.3s ease; }
        .btn-view:hover { background-color: navy; }
        .nav-link { font-size: 1rem; font-weight: 600; color: royalblue; text-decoration: none; transition: all 0.3s ease; margin-top: 1rem; }
        .nav-link:hover { color: #f8f9fa; transform: translateX(5px); }
        .tracker-navbar { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; }
        .tracker-link { font-size: 1rem; font-weight: 600; color: #127CD6; text-decoration: none; transition: all 0.3s ease; }
        .tracker-link:hover { color: #0072C6; transform: translateX(5px); }
        .tracker-active { color: #0072C6; border-bottom: 2px solid #0072C6; padding-bottom: 2px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="projects-container container">
        <h1>{{ project.project_name }}</h1>

        <div class="project-card">
            <h2>{{ project.project_name }}</h2>
            <p>{{ project.description }}</p>
            <p><strong>Tech Stack:</strong> {{ project.tech_stack }}</p>
            <p><a href="{{ project.link }}" target="_blank" class="btn-view">View Project</a></p>
        </div>

        <a href="{% url 'project_list' %}" class="nav-link nav-left">< Back to Projects</a>

        <nav class="tracker-navbar">
            <a href="{% url 'home' %}" class="tracker-link">Hero</a>
            <a href="{% url 'about' %}" class="tracker-link">About</a>
            <a href="{% url 'skills' %}" class="tracker-link">Skills</a>
            <a href="{% url 'project_list' %}" class="tracker-link tracker-active">Projects</a>
            <a href="{% url 'contact' %}" class="tracker-link">Contact</a>
        </nav>
    </div>
</body>
</html>

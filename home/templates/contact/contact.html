<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Build With Me - Engr. Kezia Yuriese Cudia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            font-family: Helvetica, Arial, sans-serif;
            color: #f8f9fa;
        }
        .contact-container {
            padding: 5rem 4rem;
            animation: fadeInUp 1.5s ease-in-out;
        }
        .contact-container h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: navy;
            margin-bottom: 2rem;
        }
        .form-control {
            background-color: rgba(173, 216, 230, 0.1);
            border: 1px solid royalblue;
            color: #f8f9fa;
        }
        .form-control:focus {
            background-color: rgba(173, 216, 230, 0.2);
            border-color: royalblue;
            box-shadow: none;
        }
        .btn-submit {
            background-color: royalblue;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background-color: navy;
        }
        .contact-details {
            margin-top: 3rem;
        }
        .contact-details h2 {
            font-size: 2rem;
            font-weight: 700;
            color: royalblue;
            margin-bottom: 1rem;
        }
        .contact-details p {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .contact-details a {
            color: royalblue;
            text-decoration: none;
            font-weight: 600;
        }
        .contact-details a:hover {
            color: #f8f9fa;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="contact-container container">
        <h1>Build With Me</h1>
        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Your Name *</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Your Email *</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Drop me a message *</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Write your message" required></textarea>
            </div>
            <button type="submit" class="btn btn-submit">
                <i class="bi bi-send-fill"></i> Submit
            </button>
        </form>

        <div class="contact-details">
            <h2>Contact Details</h2>
            <p>Email: <a href="mailto:kmcudia@student.hau.edu.ph">kmcudia@student.hau.edu.ph</a></p>
            <p>GitHub: <a href="https://github.com/Kez723Cudia" target="_blank">Kez723Cudia</a></p>
            <p>LinkedIn: <a href="https://www.linkedin.com/in/Kezia-Cudia-262303y03" target="_blank">Kezia Cudia</a></p>
            <p>WhatsApp: <a href="https://wa.me/639610989638" target="_blank">+63 961 098 9638</a></p>
            <p>Location: San Fernando, Pampanga, Philippines</p>
            <p>Availability: Open for opportunities, flexible depending on project scope</p>
        </div>
    </div>
</body>
</html>
